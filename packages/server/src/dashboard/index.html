<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Limiter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#58a6ff"/>
          <path d="M12 20 L18 26 L28 14" stroke="#0d1117" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>Claude Code Limiter</h1>
      </div>
      <p class="login-subtitle">Admin Dashboard</p>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter admin password" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
        <p id="login-error" class="form-error hidden"></p>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <button id="hamburger-btn" class="hamburger-btn" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <h1 class="mobile-title">Claude Code Limiter</h1>
      <div class="ws-indicator" id="ws-indicator-mobile" title="WebSocket disconnected">
        <span class="ws-dot"></span>
      </div>
    </header>

    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#58a6ff"/>
          <path d="M12 20 L18 26 L28 14" stroke="#0d1117" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="sidebar-brand">
          <strong>Claude Limiter</strong>
          <span class="sidebar-team" id="sidebar-team-name">Loading...</span>
        </div>
      </div>

      <ul class="nav-list">
        <li><a href="#overview" class="nav-link active" data-page="overview">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm9 0a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1V4zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm9 0a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-3z"/></svg>
          Overview
        </a></li>
        <li><a href="#users" class="nav-link" data-page="users">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zm8 0a3 3 0 11-6 0 3 3 0 016 0zm-4.07 11c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
          Users
        </a></li>
        <li><a href="#settings" class="nav-link" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Settings
        </a></li>
      </ul>

      <div class="sidebar-footer">
        <div class="ws-status" id="ws-status">
          <span class="ws-dot" id="ws-dot"></span>
          <span id="ws-label">Connecting...</span>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Sign Out</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content" class="content">
      <!-- Pages are rendered here by app.js -->
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content">
      <!-- Modals rendered here by app.js -->
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="modal-overlay hidden">
    <div class="modal-content modal-sm">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-message">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Confirm</button>
      </div>
    </div>
  </div>

  <script src="js/charts.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
